name: Build Linux AppImage

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Qt 6 and build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          qt6-base-dev \
          qt6-base-dev-tools \
          qt6-tools-dev \
          qt6-tools-dev-tools \
          libgl1-mesa-dev \
          libfuse2 \
          desktop-file-utils

    - name: Configure and Build project
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr ..
        make -j$(nproc)
        make install DESTDIR=../AppDir

    - name: Download linuxdeploy tools
      run: |
        wget -c https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget -c https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

    - name: Create .desktop file and icon
      run: |
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
        
        cat > AppDir/usr/share/applications/mazegensolver.desktop << 'EOF'
        [Desktop Entry]
        Type=Application
        Name=MazeGenSolver
        Comment=Maze Generator and Solver
        Exec=MazeGenSolver
        Icon=mazegensolver
        Categories=Utility;Education;
        EOF
        
        touch AppDir/usr/share/icons/hicolor/256x256/apps/mazegensolver.png

    - name: Build AppImage with linuxdeploy
      env:
        QMAKE: /usr/lib/qt6/bin/qmake
        DEPLOY_PLATFORM_THEMES: 1
      run: |
        ./linuxdeploy-x86_64.AppImage --appdir AppDir
        ./linuxdeploy-plugin-qt-x86_64.AppImage --appdir AppDir
        ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

    - name: Upload AppImage Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MazeGenSolver-Linux-AppImage
        path: MazeGenSolver-*.AppImage